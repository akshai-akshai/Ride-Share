<!DOCTYPE html>
<html>
<head>
    <title>Login — RideShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; }

        /* LEFT PANEL */
        .left-panel {
            width: 45%;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 60px 40px; color: #fff; position: relative; overflow: hidden;
        }
        .left-panel::before {
            content: '';
            position: absolute; width: 400px; height: 400px;
            background: rgba(245,158,11,0.08); border-radius: 50%;
            top: -100px; left: -100px;
        }
        .left-panel::after {
            content: '';
            position: absolute; width: 300px; height: 300px;
            background: rgba(99,102,241,0.08); border-radius: 50%;
            bottom: -80px; right: -80px;
        }
        .brand { font-size: 2rem; font-weight: 800; margin-bottom: 10px; }
        .brand span { color: #f59e0b; }
        .left-panel p { color: #94a3b8; text-align: center; font-size: 1rem; }
        .feature-item { display: flex; align-items: center; gap: 12px; margin-top: 25px; }
        .feature-item .icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .feature-item p { margin: 0; color: #cbd5e1; font-size: 0.9rem; }

        /* RIGHT PANEL */
        .right-panel {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: #f8fafc; padding: 40px;
        }
        .login-box { width: 100%; max-width: 420px; }
        .login-box h2 { font-size: 1.9rem; font-weight: 800; color: #0f172a; }
        .login-box p { color: #64748b; }

        .form-control {
            border: 2px solid #e2e8f0; border-radius: 12px;
            padding: 12px 16px; font-size: 0.95rem; transition: all 0.2s;
        }
        .form-control:focus { border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.15); }

        .input-group-text { background: #f1f5f9; border: 2px solid #e2e8f0; border-right: none; border-radius: 12px 0 0 12px; color: #64748b; }
        .input-group .form-control { border-left: none; border-radius: 0 12px 12px 0; }
        .input-group .form-control:focus { border-color: #f59e0b; }
        .input-group:focus-within .input-group-text { border-color: #f59e0b; }

        .btn-login {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none; color: #000; font-weight: 700;
            padding: 13px; border-radius: 12px; font-size: 1rem;
            transition: all 0.3s; width: 100%;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(245,158,11,0.4); }

        .divider { display: flex; align-items: center; gap: 12px; color: #94a3b8; font-size: 0.85rem; margin: 20px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }

        .error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 10px; padding: 10px 14px; font-size: 0.9rem; display: none; }

        @media (max-width: 768px) {
            .left-panel { display: none; }
        }
    </style>
</head>
<body>

<!-- LEFT PANEL -->
<div class="left-panel">
    <div class="text-center" style="position:relative; z-index:1;">
        <div class="brand"><i class="fas fa-car"></i> Ride<span>Share</span></div>
        <p>Kerala's most trusted ride sharing platform</p>

        <div class="feature-item mt-4">
            <div class="icon" style="background:rgba(245,158,11,0.2);">
                <i class="fas fa-bolt text-warning"></i>
            </div>
            <p>Instant ride matching across all 14 districts</p>
        </div>
        <div class="feature-item">
            <div class="icon" style="background:rgba(16,185,129,0.2);">
                <i class="fas fa-shield-alt" style="color:#10b981;"></i>
            </div>
            <p>Verified drivers with licensed vehicles</p>
        </div>
        <div class="feature-item">
            <div class="icon" style="background:rgba(99,102,241,0.2);">
                <i class="fas fa-map-marker-alt" style="color:#6366f1;"></i>
            </div>
            <p>Real-time ride status tracking</p>
        </div>
    </div>
</div>

<!-- RIGHT PANEL -->
<div class="right-panel">
    <div class="login-box">
        <a href="/" class="text-decoration-none text-muted small"><i class="fas fa-arrow-left"></i> Back to Home</a>
        <h2 class="mt-3">Welcome back</h2>
        <p class="mb-4">Sign in to your account to continue</p>

        <div id="errorMsg" class="error-msg mb-3">
            <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label fw-semibold text-dark">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold text-dark">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-sign-in-alt me-2"></i> Sign In
            </button>
        </form>

        <div class="divider">or</div>

        <p class="text-center text-muted mb-0">
            Don't have an account? <a href="/register-page/" class="fw-semibold" style="color:#f59e0b;">Create one</a>
        </p>
    </div>
</div>

<script>
    function getCSRFToken() {
        let cookieValue = null;
        document.cookie.split(';').forEach(c => {
            c = c.trim();
            if (c.startsWith('csrftoken=')) cookieValue = c.substring('csrftoken='.length);
        });
        return cookieValue;
    }

    document.getElementById("loginForm").addEventListener("submit", function(e) {
        e.preventDefault();

        const btn = document.getElementById("loginBtn");
        btn.innerHTML = `<i class="fas fa-spinner fa-spin me-2"></i> Signing in...`;
        btn.disabled = true;

        const data = {
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        };

        fetch("/api/rider/login/", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-CSRFToken": getCSRFToken() },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(data => {
            if (data.message) {
                localStorage.setItem("user", JSON.stringify(data.data));
                if (data.data.is_admin)       window.location.href = "/admin-home/";
                else if (data.data.is_driver) window.location.href = "/driver-home/";
                else                          window.location.href = "/rider-home/";
            } else {
                const err = document.getElementById("errorMsg");
                document.getElementById("errorText").innerText = data.error;
                err.style.display = "block";
                btn.innerHTML = `<i class="fas fa-sign-in-alt me-2"></i> Sign In`;
                btn.disabled = false;
            }
        })
        .catch(() => {
            btn.innerHTML = `<i class="fas fa-sign-in-alt me-2"></i> Sign In`;
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
